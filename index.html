<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuranVerse Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Amiri:wght@400;700&family=Amiri+Quran&family=Noto+Naskh+Arabic:wght@400;700&family=Scheherazade+New:wght@400;700&family=Harmattan:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="symbol">۝</div>
    </header>

    <main class="app-container">
        <section class="stage">
            <div class="canvas-wrapper">
                <canvas id="verseCanvas"></canvas>
            </div>
        </section>

        <section class="panel">
            <nav class="tabs">
                <button class="tab-trigger active" onclick="openTab(event, 'selection')">Verse Selection</button>
                <button class="tab-trigger" onclick="openTab(event, 'custom')">Design & Layout</button>
            </nav>

            <div id="selection" class="tab-content active">
                <div class="section-group">
                    <h3 class="section-title">Verse Selection</h3>
                    <div class="field">
                        <label>Surah (السورة)</label>
                        <select id="surah-select" dir="rtl"></select>
                    </div>
                    <div class="grid-2">
                        <div class="field">
                            <label>From</label>
                            <input type="number" id="start-verse" value="1" min="1">
                        </div>
                        <div class="field">
                            <label>To</label>
                            <input type="number" id="end-verse" value="1" min="1">
                        </div>
                    </div>
                </div>
            </div>

            <div id="custom" class="tab-content">
                <div class="section-group">
                    <h3 class="section-title">Typography</h3>
                    <div class="field">
                        <label>Qur'anic Font</label>
                        <select id="font-family">
                            <option value="'Amiri Quran', serif">Amiri Quran</option>
                            <option value="'Amiri', serif">Amiri</option>
                            <option value="'Noto Naskh Arabic', serif">Noto Naskh</option>
                            <option value="'Scheherazade New', serif">Scheherazade New</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Basmala Size: <span id="basmala-size-val">48</span>px</label>
                        <input type="range" id="basmala-size" min="20" max="150" value="48">
                    </div>
                    <div class="field">
                        <label>Verse Size: <span id="verse-size-val">32</span>px</label>
                        <input type="range" id="verse-size" min="20" max="120" value="32">
                    </div>
                    <div class="field">
                        <label>Reference Size: <span id="ref-size-val">25</span>px</label>
                        <input type="range" id="ref-size" min="15" max="80" value="25">
                    </div>
                    <div class="field">
                        <label>Basmala Spacing: <span id="basmala-dist-val">100</span>px</label>
                        <input type="range" id="basmala-dist" min="20" max="250" value="100">
                    </div>
                </div>

                <div class="section-group">
                    <h3 class="section-title">Background</h3>
                    <div class="field">
                        <label>Text Color</label>
                        <input type="color" id="text-color" value="#ffffff">
                    </div>
                    <div class="field">
                        <label>Solid BG Color</label>
                        <input type="color" id="bg-color" value="#000000">
                    </div>
                    <div class="field checkbox-field">
                        <input type="checkbox" id="bg-image-enable">
                        <label for="bg-image-enable">Enable background image</label>
                    </div>
                    <div id="bg-image-controls" class="disabled-group">
                        <div class="field">
                            <label>Upload Image</label>
                            <input type="file" id="bg-image-upload" accept="image/*" disabled>
                        </div>
                        <div class="field">
                            <label>Image Opacity: <span id="bg-opacity-val">100</span>%</label>
                            <input type="range" id="bg-opacity" min="0" max="100" value="100" disabled>
                        </div>
                    </div>
                </div>

                <div class="section-group">
                    <h3 class="section-title">Watermark</h3>
                    <div class="field checkbox-field">
                        <input type="checkbox" id="wm-enable" checked>
                        <label for="wm-enable">Enable watermark</label>
                    </div>
                    <div id="wm-controls">
                        <div class="field">
                            <label>Watermark Text</label>
                            <input type="text" id="wm-text" value="https://haithamaouati.github.io/QuranVerse">
                        </div>
                        <div class="grid-2">
                            <div class="field">
                                <label>Color</label>
                                <input type="color" id="wm-color" value="#808080">
                            </div>
                            <div class="field">
                                <label>Opacity: <span id="wm-opacity-val">50</span>%</label>
                                <input type="range" id="wm-opacity" min="0" max="100" value="50">
                            </div>
                        </div>
                    </div>
                </div>

                <button type="button" id="download-btn" class="action-btn">Export Image</button>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>Developed with <span class="heart">♥︎</span> by <a href="https://github.com/haithamaouati" target="_blank">Haitham Aouati</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
