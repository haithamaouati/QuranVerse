<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuranVerse Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Amiri:ital,wght@0,400;0,700;1,400&family=Amiri+Quran&family=Noto+Naskh+Arabic:wght@400;700&family=Noto+Kufi+Arabic:wght@400;700&family=Scheherazade+New:wght@400;700&family=Lateef&family=Harmattan:wght@400;700&family=Reem+Kufi:wght@400;700&family=Markazi+Text:wght@400;700&family=Aref+Ruqaa:wght@400;700&family=Mirza:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-bar">
        <h1>﷽</h1>
    </header>

    <main class="container">
        <section class="preview-area">
            <canvas id="verseCanvas"></canvas>
        </section>

        <section class="settings-panel">
            <div class="tabs">
                <button class="tab-link active" onclick="openTab(event, 'verse-selection')">Verse Selection</button>
                <button class="tab-link" onclick="openTab(event, 'image-customization')">Customization</button>
            </div>

            <div id="verse-selection" class="tab-content active">
                <div class="control-group">
                    <label for="surah-select">Surah (السورة)</label>
                    <select id="surah-select" dir="rtl"></select>
                </div>
                <div class="control-row">
                    <div class="control-group">
                        <label for="start-verse">Start Verse</label>
                        <input type="number" id="start-verse" value="1" min="1">
                    </div>
                    <div class="control-group">
                        <label for="end-verse">End Verse</label>
                        <input type="number" id="end-verse" value="1" min="1">
                    </div>
                </div>
            </div>

            <div id="image-customization" class="tab-content">
                <div class="control-group">
                    <label for="font-family">Quranic Arabic Font</label>
                    <select id="font-family">
                        <option value="'Amiri Quran', serif">Amiri Quran</option>
                        <option value="'Amiri', serif">Amiri</option>
                        <option value="'Noto Naskh Arabic', serif">Noto Naskh</option>
                        <option value="'Noto Kufi Arabic', sans-serif">Noto Kufi</option>
                        <option value="'Scheherazade New', serif">Scheherazade New</option>
                        <option value="'Lateef', cursive">Lateef</option>
                        <option value="'Harmattan', sans-serif">Harmattan</option>
                        <option value="'Reem Kufi', sans-serif">Reem Kufi</option>
                        <option value="'Markazi Text', serif">Markazi Text</option>
                        <option value="'Aref Ruqaa', cursive">Aref Ruqaa</option>
                        <option value="'Mirza', cursive">Mirza</option>
                    </select>
                </div>
                <div class="control-row">
                    <div class="control-group">
                        <label for="bg-color">Background Color</label>
                        <input type="color" id="bg-color" value="#000000">
                    </div>
                    <div class="control-group">
                        <label for="text-color">Text Color</label>
                        <input type="color" id="text-color" value="#ffffff">
                    </div>
                </div>
                <div class="control-group">
                    <label for="font-size">Font Size (<span id="font-size-val">32</span>px)</label>
                    <input type="range" id="font-size" min="12" max="100" value="32">
                </div>
                <div class="control-row">
                    <div class="control-group">
                        <label for="canvas-width">Width</label>
                        <input type="number" id="canvas-width" value="1080">
                    </div>
                    <div class="control-group">
                        <label for="canvas-height">Height</label>
                        <input type="number" id="canvas-height" value="1080">
                    </div>
                </div>
                <button type="button" id="download-btn" class="primary-btn">Download Generated Image</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
